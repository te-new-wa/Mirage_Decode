name: Build Mobile Apps 

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'
          cache-dependency-path: 'web/yarn.lock'

      - name: Prepare Web Assets (Vite Build)
        run: |
          cd web
          yarn install --frozen-lockfile
          yarn build

      # ==========================================
      # 性能优化核心 1：开启 Gradle 依赖缓存
      # 第一次构建会下载依赖并缓存，后续构建直接复用，跳过几百MB的下载
      # ==========================================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle' 

      - name: Install & Build Android
        run: |
          cd web
          # 优化：统一使用 yarn，避免 npm 和 yarn 混用导致的锁文件冲突和额外下载时间
          yarn add @capacitor/core @capacitor/cli @capacitor/android @capacitor/filesystem @capacitor/share
          
          if [ ! -d "android" ]; then
            npx cap init "MirageDecode" "com.mirage.decode" --web-dir ../docs
            npx cap add android
          fi
          
          sed -i '/dependencies {/a \    constraints { \n        implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22") { because("kotlin-stdlib-jdk7 is now part of kotlin-stdlib") } \n        implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22") { because("kotlin-stdlib-jdk8 is now part of kotlin-stdlib") } \n    }' android/app/build.gradle

          npx cap sync android
          cd android
          chmod +x gradlew
          
          # ==========================================
          # 性能优化核心 2：添加 Gradle 构建优化参数
          # --no-daemon：CI 环境下禁用后台守护进程，防止进程残留报错
          # --parallel：如果有多个模块，并行编译
          # --build-cache：开启 Gradle 本地构建缓存，没改动的代码不会重新编译
          # ==========================================
          ./gradlew assembleDebug --no-daemon --parallel --build-cache

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: web/android/app/build/outputs/apk/debug/app-debug.apk
