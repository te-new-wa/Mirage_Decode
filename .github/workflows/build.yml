name: Build Mobile Apps 

on:
  push:
    branches: [ master ]
    paths:
      - 'web/**'
      - '.github/workflows/build-android.yml' 
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'yarn'
          cache-dependency-path: 'web/yarn.lock'

      - name: Prepare Web Assets (Vite Build)
        run: |
          cd web
          yarn install --frozen-lockfile
          yarn build

      # ==========================================
      # 核心逻辑 1：注入 JS，负责转换 Blob 和 监听长按
      # ==========================================
      - name: Inject JS Handler
        run: |
          cat > /tmp/js_handler.js << 'EOF'
          <script>
          (function() {
              // 1. 把前端的 blob: 图片实时转换成 data: 图片，因为安卓底层无法直接读取 blob:
              const convertBlob = async (img) => {
                  if (img.src && img.src.startsWith("blob:")) {
                      try {
                          const res = await fetch(img.src);
                          const blob = await res.blob();
                          const reader = new FileReader();
                          reader.onload = () => { img.src = reader.result; };
                          reader.readAsDataURL(blob);
                      } catch(e) { console.error("Blob转换失败", e); }
                  }
              };
              const observer = new MutationObserver((mutations) => {
                  for (let m of mutations) {
                      for (let node of m.addedNodes) {
                          if (node.tagName === "IMG") convertBlob(node);
                          else if (node.getElementsByTagName) Array.from(node.getElementsByTagName("img")).forEach(convertBlob);
                      }
                  }
              });
              observer.observe(document.body, { childList: true, subtree: true });
              document.querySelectorAll("img").forEach(convertBlob);

              // 2. 使用 JS 监听长按保存（绕过 Android 15 被移除的 HitTestResult）
              if (window.AndroidNativeBridge) {
                  // 彻底屏蔽安卓原生的图片长按菜单
                  document.addEventListener('contextmenu', function(e) {
                      if (e.target.tagName === 'IMG' || (e.target.closest && e.target.closest('img'))) {
                          e.preventDefault();
                      }
                  }, true);

                  let timer = null;
                  document.addEventListener('touchstart', function(e) {
                      let target = e.target;
                      while (target && target.tagName !== 'IMG') target = target.parentElement;
                      if (target && target.src) {
                          timer = setTimeout(() => {
                              window.AndroidNativeBridge.saveImageToGallery(target.src);
                          }, 500); // 长按 500ms 触发
                      }
                  }, true); 

                  document.addEventListener('touchend', function() { clearTimeout(timer); }, true);
                  document.addEventListener('touchmove', function() { clearTimeout(timer); }, true);
                  document.addEventListener('touchcancel', function() { clearTimeout(timer); }, true);
              }
          })();
          </script>
          EOF
          
          sed -i '/<head>/r /tmp/js_handler.js' docs/index.html

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install & Build Android
        run: |
          cd web
          yarn add @capacitor/core @capacitor/cli @capacitor/android
          
          if [ ! -d "android" ]; then
            npx cap init "MirageDecode" "com.mirage.decode" --web-dir ../docs
            npx cap add android
          fi

          # ==========================================
          # 核心逻辑 2：重写 MainActivity（修复 API 35 兼容性 + Base64 引用错误）
          # ==========================================
          cat > android/app/src/main/java/com/mirage/decode/MainActivity.java << 'JAVA_EOF'
          package com.mirage.decode;

          import android.Manifest;
          import android.content.ContentValues;
          import android.content.pm.PackageManager;
          import android.graphics.Bitmap;
          import android.graphics.BitmapFactory;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.os.Environment;
          import android.os.Handler;
          import android.os.Looper;
          import android.provider.MediaStore;
          import android.util.Base64; // 修复：使用 android.util.Base64
          import android.webkit.JavascriptInterface;
          import android.webkit.WebView;
          import android.widget.Toast;

          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;

          import com.getcapacitor.BridgeActivity;

          import java.io.OutputStream;

          public class MainActivity extends BridgeActivity {
              private static final int REQUEST_STORAGE_PERMISSION = 1001;
              private String pendingImageUrl = null;

              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState); // 修复：去掉多余括号
                  
                  getWindow().getDecorView().post(() -> {
                      WebView webView = getBridge().getWebView();
                      if (webView != null) {
                          // 注册 JS 桥接，供前端长按调用
                          webView.addJavascriptInterface(new WebAppInterface(), "AndroidNativeBridge");
                      }
                  });
              }

              // JS 桥接类
              public class WebAppInterface {
                  @JavascriptInterface
                  public void saveImageToGallery(final String imageUrl) {
                      checkPermissionAndSave(imageUrl);
                  }
              }

              private void checkPermissionAndSave(String imageUrl) {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                      saveImage(imageUrl);
                  } else {
                      if (ContextCompat.checkSelfPermission(this, Manifest.permission.WRITE_EXTERNAL_STORAGE) == PackageManager.PERMISSION_GRANTED) {
                          saveImage(imageUrl);
                      } else {
                          pendingImageUrl = imageUrl;
                          ActivityCompat.requestPermissions(this, new String[]{Manifest.permission.WRITE_EXTERNAL_STORAGE}, REQUEST_STORAGE_PERMISSION);
                      }
                  }
              }

              @Override
              public void onRequestPermissionsResult(int requestCode, String[] permissions, int[] grantResults) {
                  super.onRequestPermissionsResult(requestCode, permissions, grantResults);
                  if (requestCode == REQUEST_STORAGE_PERMISSION) {
                      if (grantResults.length > 0 && grantResults[0] == PackageManager.PERMISSION_GRANTED && pendingImageUrl != null) {
                          saveImage(pendingImageUrl);
                          pendingImageUrl = null;
                      } else {
                          Toast.makeText(this, "存储权限被拒绝，无法保存图片", Toast.LENGTH_SHORT).show();
                      }
                  }
              }

              private void saveImage(final String imageUrl) {
                  showMsg("正在保存图片...");
                  new Thread(() -> {
                      try {
                          Bitmap bitmap = null;
                          
                          if (imageUrl.startsWith("data:")) {
                              String base64Str = imageUrl.substring(imageUrl.indexOf(",") + 1);
                              byte[] decodedBytes = Base64.decode(base64Str, Base64.DEFAULT); 
                              bitmap = BitmapFactory.decodeByteArray(decodedBytes, 0, decodedBytes.length);
                          } else if (imageUrl.startsWith("http")) {
                              java.net.URL url = new java.net.URL(imageUrl);
                              java.io.InputStream is = url.openStream();
                              bitmap = BitmapFactory.decodeStream(is);
                              is.close();
                          }

                          if (bitmap == null) {
                              showMsg("保存失败：无法解析图片");
                              return;
                          }

                          String fileName = "Mirage_" + System.currentTimeMillis() + ".png";
                          ContentValues values = new ContentValues();
                          values.put(MediaStore.Images.Media.DISPLAY_NAME, fileName);
                          values.put(MediaStore.Images.Media.MIME_TYPE, "image/png");
                          values.put(MediaStore.Images.Media.RELATIVE_PATH, Environment.DIRECTORY_PICTURES + "/MirageDecode");

                          Uri uri = getContentResolver().insert(MediaStore.Images.Media.EXTERNAL_CONTENT_URI, values);
                          if (uri != null) {
                              OutputStream outputStream = getContentResolver().openOutputStream(uri);
                              if (outputStream != null) {
                                  bitmap.compress(Bitmap.CompressFormat.PNG, 100, outputStream);
                                  outputStream.close();
                                  showMsg("图片已保存至系统相册");
                              }
                          }
                          bitmap.recycle();
                      } catch (Exception e) {
                          e.printStackTrace();
                          showMsg("保存出错: " + e.getMessage());
                      }
                  }).start();
              }

              private void showMsg(String msg) {
                  new Handler(Looper.getMainLooper()).post(() -> Toast.makeText(this, msg, Toast.LENGTH_SHORT).show());
              }
          }
          JAVA_EOF

          # 兼容旧版安卓的存储策略
          sed -i 's/<application /<application android:requestLegacyExternalStorage="true" /' android/app/src/main/AndroidManifest.xml

          # 解决 kotlin stdlib 冲突
          sed -i '/dependencies {/a \    constraints { \n        implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22") { because("kotlin-stdlib-jdk7 is now part of kotlin-stdlib") } \n        implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22") { because("kotlin-stdlib-jdk8 is now part of kotlin-stdlib") } \n    }' android/app/build.gradle

          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --parallel --build-cache

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: web/android/app/build/outputs/apk/debug/app-debug.apk
