name: Build Android APK

on:
  workflow_dispatch: # 手动触发按钮

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 配置 Java 环境 (安卓编译必须)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. 配置 Node 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'
          cache-dependency-path: 'web/yarn.lock'

      # 4. 安装前端依赖并构建网页
      - name: Install & Build Web App
        working-directory: web
        run: |
          yarn install --frozen-lockfile
          yarn build
          # 构建完成后，产物会输出到上一级的 docs/ 目录

      # 5. 初始化 Capacitor 并配置安卓环境
      - name: Initialize Capacitor
        working-directory: ${{ github.workspace }}
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "Mirage Decode" "com.tankfactory.miragedecode" --web-dir docs
          # web-dir 必须指向 Vite 的输出目录

      # 6. 添加安卓平台并同步网页文件
      - name: Add Android Platform & Sync
        working-directory: ${{ github.workspace }}
        run: |
          npx cap add android
          npx cap sync android

      # 7. 编译 APK (Debug版本，无需签名密钥，适合自用测试)
      - name: Build Android APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      # 8. 上传生成的 APK 文件
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mirage-Decode-Android
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
