name: Build Mobile Apps 

on:
  push:
    branches: [ master ]
    paths:
      - 'web/**'            # 优化：只有 web 目录变动才自动打包，节省 Actions 时长
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'
          cache-dependency-path: 'web/yarn.lock'

      # 核心修改：不能用 cp，必须用 Vite 编译
      - name: Prepare Web Assets (Vite Build)
        run: |
          cd web
          yarn install --frozen-lockfile
          yarn build
          # 构建完成后，产物被输出到了上一级的 docs/ 目录 (即 ../docs)

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install & Build Android
        run: |
          cd web
          npm install @capacitor/core @capacitor/cli @capacitor/android
          if [ ! -d "android" ]; then
            # 核心修改：因为当前在 web/ 目录，所以 docs 目录在上一级，写 ../docs
            npx cap init "MirageDecode" "com.mirage.decode" --web-dir ../docs
            npx cap add android
          fi
          
          # 修复点 1: 解决 Android Kotlin 类重复问题 (Duplicate class error)
          # 在 build.gradle 中强制统一 Kotlin 版本
          sed -i '/dependencies {/a \    constraints { \n        implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22") { because("kotlin-stdlib-jdk7 is now part of kotlin-stdlib") } \n        implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22") { because("kotlin-stdlib-jdk8 is now part of kotlin-stdlib") } \n    }' android/app/build.gradle

          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: web/android/app/build/outputs/apk/debug/app-debug.apk
