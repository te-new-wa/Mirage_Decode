name: Build single HTML (web)

on:
  push:
    branches:
      - master      # 或 main，按你实际主分支名改
    paths:
      - 'web/**'    # 只有 web/ 目录变动才触发（可选）
  pull_request:
    branches:
      - master

permissions:
  contents: read   # 不需要写 repo，只要上传 artifact

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'        # 因为 web/ 下有 yarn.lock；如果是 npm 可改成 npm

      - name: Install dependencies (web)
        working-directory: web
        run: yarn install --frozen-lockfile   # 如果你是 npm：npm ci

      - name: Build web (single HTML)
        working-directory: web
        run: yarn build                     # 对应 package.json 的 "build": "tsc -b && vite build"

      - name: Prepare artifact (zip)
        run: |
          mkdir -p artifact
          cp docs/index.html artifact/
          cd artifact
          zip ../mirage-decode-single-html.zip index.html
        working-directory: ${{ github.workspace }}  # 根目录

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mirage-decode-single-html
          path: mirage-decode-single-html.zip
          retention-days: 30      # 保留 30 天，按需改
