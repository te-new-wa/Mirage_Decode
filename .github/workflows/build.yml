name: Build single HTML (web)

on:
  workflow_dispatch: 
  push:
    branches:
      - master
    paths:
      - 'web/**'
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'   # 如果你用的是 npm，请改成 cache: 'npm'

      - name: Install dependencies (web)
        working-directory: web
        run: yarn install --frozen-lockfile   # 如果你用的是 npm，请改成 npm ci

      - name: Build web (single HTML)
        working-directory: web
        run: yarn build                     # 如果你用的是 npm，请改成 npm run build

      - name: Prepare artifact (zip)
        run: |
          mkdir -p artifact
          cp docs/index.html artifact/
          cd artifact
          zip ../mirage-decode-single-html.zip index.html
        working-directory: ${{ github.workspace }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mirage-decode-single-html
          path: mirage-decode-single-html.zip
          retention-days: 30
