name: Build Mobile Apps (Android & iOS)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare Web Assets
        run: |
          cd web
          mkdir -p www
          cp -r index.html css js lib www/ 2>/dev/null || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21' # 修复点：升级到 Java 21

      - name: Install & Build Android
        run: |
          cd web
          npm install @capacitor/core @capacitor/cli @capacitor/android
          if [ ! -d "android" ]; then
            npx cap init "MirageDecode" "com.mirage.decode" --web-dir www
            npx cap add android
          fi
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: web/android/app/build/outputs/apk/debug/app-debug.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare Web Assets
        run: |
          cd web
          mkdir -p www
          cp -r index.html css js lib www/ 2>/dev/null || true

      - name: Install Capacitor
        run: |
          cd web
          npm install @capacitor/core @capacitor/cli @capacitor/ios

      - name: Initialize & Fix iOS Target
        run: |
          cd web
          if [ ! -d "ios" ]; then
            npx cap init "MirageDecode" "com.mirage.decode" --web-dir www
            npx cap add ios
          fi
          
          # 修复点：强制将 Podfile 中的平台版本从默认(可能是12或13)改为 14.0
          sed -i '' "s/platform :ios, '1[23].0'/platform :ios, '14.0'/g" ios/App/Podfile
          
          npx cap sync ios

      - name: Build iOS App
        run: |
          cd web/ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos build CODE_SIGNING_ALLOWED=NO

      - name: Upload iOS Project
        uses: actions/upload-artifact@v4
        with:
          name: ios-project
          path: web/ios/App
