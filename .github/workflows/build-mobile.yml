name: Build Mobile Apps (Android & iOS)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare Web Assets
        run: |
          cd web
          mkdir -p www
          cp -r index.html css js lib www/ 2>/dev/null || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install & Build Android
        run: |
          cd web
          npm install @capacitor/core @capacitor/cli @capacitor/android
          if [ ! -d "android" ]; then
            npx cap init "MirageDecode" "com.mirage.decode" --web-dir www
            npx cap add android
          fi
          
          # 修复点 1: 解决 Android Kotlin 类重复问题 (Duplicate class error)
          # 在 build.gradle 中强制统一 Kotlin 版本
          sed -i '/dependencies {/a \    constraints { \n        implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22") { because("kotlin-stdlib-jdk7 is now part of kotlin-stdlib") } \n        implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22") { because("kotlin-stdlib-jdk8 is now part of kotlin-stdlib") } \n    }' android/app/build.gradle

          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: web/android/app/build/outputs/apk/debug/app-debug.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare Web Assets
        run: |
          cd web
          mkdir -p www
          cp -r index.html css js lib www/ 2>/dev/null || true

      - name: Install Capacitor
        run: |
          cd web
          npm install @capacitor/core @capacitor/cli @capacitor/ios

      - name: Initialize & Fix iOS Target
        run: |
          cd web
          if [ ! -d "ios" ]; then
            npx cap init "MirageDecode" "com.mirage.decode" --web-dir www
            npx cap add ios
          fi
          
          # 修复点 2: 彻底解决 iOS Deployment Target 过低问题
          # 1. 修改 Podfile 的平台定义
          sed -i '' "s/platform :ios, '1[0-9].0'/platform :ios, '14.0'/g" ios/App/Podfile
          # 2. 修改 project.pbxproj 里的所有部署目标版本
          find ios/App/App.xcodeproj -name "project.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 14.0;/g' {} +
          
          npx cap sync ios

      - name: Build iOS App
        run: |
          cd web/ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos build CODE_SIGNING_ALLOWED=NO

      - name: Upload iOS Project
        uses: actions/upload-artifact@v4
        with:
          name: ios-project
          path: web/ios/App
