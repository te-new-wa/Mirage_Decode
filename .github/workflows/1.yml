name: Build Mobile Apps (iOS)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
 build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare Web Assets
        run: |
          cd web
          mkdir -p www
          cp -r index.html css js lib www/ 2>/dev/null || true

      - name: Install Capacitor
        run: |
          cd web
          npm install @capacitor/core @capacitor/cli @capacitor/ios

      - name: Initialize & Force Fix iOS Target
        run: |
          cd web
          if [ ! -d "ios" ]; then
            npx cap init "MirageDecode" "com.mirage.decode" --web-dir www || true
            # 允许 add ios 失败，不中断流程
            npx cap add ios || echo "Allowing auto pod install to fail initially..."
          fi
          
          # 使用 Python 进行绝对精准且跨平台的文本替换，告别 macOS sed 的兼容问题
          cat << 'EOF' > fix_ios_target.py
          import os
          import re

          pod_path = 'ios/App/Podfile'
          if os.path.exists(pod_path):
              with open(pod_path, 'r') as f: content = f.read()
              # 强制将 platform :ios 后面的任何版本号替换为 14.0
              content = re.sub(r'platform :ios, .*', "platform :ios, '14.0'", content)
              with open(pod_path, 'w') as f: f.write(content)

          pbx_path = 'ios/App/App.xcodeproj/project.pbxproj'
          if os.path.exists(pbx_path):
              with open(pbx_path, 'r') as f: content = f.read()
              # 强制将工程文件中的所有编译目标替换为 14.0
              content = re.sub(r'IPHONEOS_DEPLOYMENT_TARGET = [0-9.]+;', 'IPHONEOS_DEPLOYMENT_TARGET = 14.0;', content)
              with open(pbx_path, 'w') as f: f.write(content)
          EOF
          
          python3 fix_ios_target.py
          
          # 清除上一次失败遗留的 lock 文件和 Pods 缓存，防止它读取旧记录
          rm -rf ios/App/Podfile.lock ios/App/Pods
          
          # 重新执行 sync，此时环境已被彻底清理且锁定在 14.0
          npx cap sync ios

      - name: Build iOS App
        run: |
          cd web/ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

      - name: Upload iOS Project
        uses: actions/upload-artifact@v4
        with:
          name: ios-project
          path: web/ios/App
